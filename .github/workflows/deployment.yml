name: Deployment

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Build Docker image with build-time environment variables
      - name: Build Docker Image
        run: |
          docker build \
            --build-arg AUTH_GOOGLE_ID="${{ secrets.AUTH_GOOGLE_ID }}" \
            --build-arg AUTH_GOOGLE_SECRET="${{ secrets.AUTH_GOOGLE_SECRET }}" \
            --build-arg AUTH_SECRET="${{ secrets.AUTH_SECRET }}" \
            --build-arg DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --build-arg GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --build-arg GEMINI_API_KEY_MAIN="${{ secrets.GEMINI_API_KEY_MAIN }}" \
            --build-arg NEXT_BASE_URL="${{ secrets.NEXT_BASE_URL }}" \
            --build-arg SMTP_HOST="${{ secrets.SMTP_HOST }}" \
            --build-arg SMTP_PORT="${{ secrets.SMTP_PORT }}" \
            --build-arg SMTP_USER="${{ secrets.SMTP_USER }}" \
            --build-arg SMTP_PASS="${{ secrets.SMTP_PASS }}" \
            --build-arg NEXT_PUBLIC_POSTHOG_KEY="${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}" \
            --build-arg NEXT_PUBLIC_POSTHOG_HOST="${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}" \
            --build-arg RAZORPAY_KEY_ID="${{ secrets.RAZORPAY_KEY_ID }}" \
            --build-arg RAZORPAY_KEY_SECRET="${{ secrets.RAZORPAY_KEY_SECRET }}" \
            --build-arg RAZORPAY_WEBHOOK_SECRET="${{ secrets.RAZORPAY_WEBHOOK_SECRET }}" \
            --build-arg NEXT_PUBLIC_RAZORPAY_KEY_ID="${{ secrets.NEXT_PUBLIC_RAZORPAY_KEY_ID }}" \
            -t akhilpalsra1/etrant:latest .

      - name: Docker Login
        run: echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Push Image
        run: docker push akhilpalsra1/etrant:latest
